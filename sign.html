<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">PostApp</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- SIGNUP FORM -->
<div class="container signCont ">
    <div class="signup-form card">

        <h2>Create &nbsp; Account</h2>

        <form>

            <input id="name" type="text" placeholder="Enter your Name" required>

            <input id="userEmail" type="email" placeholder="Enter your Email" required>

            <input id="userPassword" type="password" placeholder="Enter password" required>

            <input id="confirmPassword" type="password" placeholder="Confirm password" required>

            <!-- FIX -->
            <button type="button" onclick="signfrom()">Signup</button>

        </form>

        <p>Already have an account? <a href="login.html">Login</a></p>

    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
